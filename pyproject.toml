[build-system]
requires = ["setuptools>=62", "setuptools_scm>8"]
build-backend = "setuptools.build_meta"

[project]
name = "heurist-api"
dependencies = [
    "annotated-types==0.6.0",
    "certifi==2024.2.2",
    "charset-normalizer==3.3.2",
    "click==8.1.7",
    "ghp-import==2.1.0",
    "idna==3.6",
    "Jinja2==3.1.3",
    "lxml==5.1.0",
    "Markdown==3.5.2",
    "MarkupSafe==2.1.5",
    "mergedeep==1.3.4",
    "mkdocs==1.5.3",
    "packaging==24.0",
    "pathspec==0.12.1",
    "platformdirs==4.2.0",
    "python-dateutil==2.9.0.post0",
    "PyYAML==6.0.1",
    "pyyaml_env_tag==0.1",
    "requests==2.31.0",
    "six==1.16.0",
    "urllib3==2.2.1",
    "watchdog==4.0.0",
    "iniconfig==2.0.0",
    "pluggy==1.4.0",
    "pydantic==2.6.4",
    "pydantic-core==2.16.3",
    "pytest==8.1.1",
    "typing-extensions==4.10.0"
]
dynamic = ["version"]

[tool.setuptools.dynamic]
version = {attr = "heurist_api.VERSION"}

[tool.setuptools_scm]
# Leave empty for the dynamic version metadata

[project.scripts]
heurist = "heurist_api.cli:cli"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v -ra -q"
log_cli = true
log_cli_level = "INFO"
log_format = "%(asctime)s %(levelname)s %(message)s"
log_date_format = "%Y-%m-%d %H:%M:%S"
minversion = "6.0"
filterwarnings = "ignore"
# Specify a custom directory for pytest cache
cache_dir = ".pytest_cache"